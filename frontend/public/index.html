<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLibrary - Exquisite Book Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <h1>MyLibrary</h1>
            </div>
            <ul class="nav-links">
                <li class="active" data-view="dashboard">Dashboard</li>
                <li data-view="library">My Library</li>
                <li data-view="wishlist">Wishlist & Recs</li>
                <li data-view="ledger">Lending Ledger</li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="content">
            <!-- Header (Search/Add Book) -->
            <header>
                <h2>Welcome Back!</h2>
                <button id="add-book-btn" class="primary-btn">+ Add Book</button>
            </header>

            <!-- Views -->
            <div id="views">
                <!-- Dashboard View -->
                <section id="dashboard-view" class="view active">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>Total Books</h3>
                            <p id="stat-total">0</p>
                        </div>
                        <div class="stat-card">
                            <h3>To Read</h3>
                            <p id="stat-toread">0</p>
                        </div>
                        <div class="stat-card">
                            <h3>Lent Out</h3>
                            <p id="stat-lent">0</p>
                        </div>
                    </div>
                </section>

                <!-- Library View -->
                <section id="library-view" class="view">
                    <div class="view-header">
                        <h3>My Owned Library</h3>
                        <div class="controls">
                            <div class="search-wrapper">
                                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                                <input type="text" id="library-search" placeholder="Search by title, author, or genre..." class="search-input">
                            </div>
                            <div class="toggle-group">
                                <button id="view-grid" class="icon-toggle active" title="Grid View">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                                </button>
                                <button id="view-list" class="icon-toggle" title="List View">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="book-grid grid-mode" id="library-grid"></div>
                </section>

                <!-- Wishlist View -->
                <section id="wishlist-view" class="view">
                    <h3>Wishlist (To Read / To Buy)</h3>
                    <div class="book-grid" id="wishlist-grid"></div>

                    <h3 class="margin-top">✨ AI Mood Librarian & Stack Ranker</h3>
                    <div style="margin-top: 1rem; margin-bottom: 2rem;">
                        <input type="text" id="mood-input" placeholder="e.g. 'I'm in the mood for a dark, suspenseful sci-fi thriller'" style="width: 60%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.3); color: white;">
                        <button id="mood-btn" class="primary-btn" style="margin-left: 1rem;">Ask Librarian</button>
                    </div>
                    <div id="ai-response-container" style="display: none; background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent-color); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
                        <!-- Content dynamically populated by JS -->
                    </div>

                    <h3 class="margin-top">✨ Recommended Buy Matches (Top Rated)</h3>
                    <div class="book-grid" id="recommendation-grid"></div>
                </section>

                <!-- Ledger View -->
                <section id="ledger-view" class="view">
                    <h3>Lending Ledger</h3>
                    <div class="book-grid" id="ledger-grid"></div>
                </section>
            </div>
        </main>
    </div>

    <!-- Add Book Modal -->
    <div id="book-modal" class="modal hidden">
        <div class="modal-content glass">
            <span class="close-btn">&times;</span>
            <h3 id="modal-title">Add a Book</h3>
            <form id="book-form">
                <input type="hidden" id="book-id">
                
                <!-- If Title/Author is entered, we can trigger external fetch in backend -->
                <label>Title</label>
                <input type="text" id="book-title" required placeholder="e.g. Dune">

                <label>Author</label>
                <input type="text" id="book-author" placeholder="e.g. Frank Herbert">

                <label>Genre <small>(Leave blank to auto-fetch)</small></label>
                <input type="text" id="book-genre" placeholder="e.g. Science Fiction">

                <label>Status</label>
                <select id="book-status">
                    <option value="Owned">Owned</option>
                    <option value="ToRead">To Read</option>
                    <option value="ToBuy">To Buy</option>
                </select>

                <div id="personal-rating-container">
                    <label>Personal Rating (1-5) <small>(Optional / For after you've read it)</small></label>
                    <input type="number" id="book-rating" min="0" max="5" value="0">
                </div>

                <div id="notes-container">
                    <label>Notes & Thoughts <small>(Optional)</small></label>
                    <textarea id="book-notes" placeholder="Write your thoughts here..." rows="3"></textarea>
                </div>

                <div id="lending-section">
                    <label>Lending Status</label>
                    <select id="book-lent-status">
                        <option value="None">None</option>
                        <option value="LentOut">Lent Out</option>
                        <option value="Borrowed">Borrowed</option>
                    </select>

                    <label id="person-label">Person Name</label>
                    <input type="text" id="book-person" placeholder="Name of friend">
                    
                    <label id="date-label">Transaction Date</label>
                    <input type="date" id="book-date">
                </div>

                <button type="submit" class="primary-btn submit-btn">Save Book</button>
            </form>
        </div>
    </div>

    <script src="js/app.js?v=4"></script>
</body>
</html>
